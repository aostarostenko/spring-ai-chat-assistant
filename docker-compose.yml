services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: spring-ai-chat-db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ai_assistant_db
    volumes:
      - mongo_data:/data/db

  # 2. Spring AI Chat Assistant Service
  spring-ai-chat-assistant:
    build: .
    container_name: spring-ai-chat-assistant
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      # Use the internal service name 'mongodb' for the connection URI [cite: 181]
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/ai_assistant_db
      # Enables Java 25 Virtual Threads for high-performance AI processing [cite: 181, 201]
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      # Securely injected from your local environment variables [cite: 181, 206]
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

volumes:
  mongo_data: