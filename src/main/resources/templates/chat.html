<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Chat Assistant</title>
    <link rel="stylesheet" th:href="@{/css/chat-style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <a th:href="@{/chat/new}" class="new-chat-btn">+ New Chat</a>
    </div>
    <div class="session-list">
        <a th:each="chatSession : ${sessions}"
           th:href="@{/chat/{id}(id=${chatSession.id})}"
           th:id="'session-' + ${chatSession.id}"
           th:attr="data-session-id=${chatSession.id}"
           th:class="'session-item ' + (${chatSession.id == activeSessionId} ? 'active' : '')"
           th:text="${chatSession.summary != null ? chatSession.summary : 'New Chat'}">
        </a>
    </div>
    <div class="sidebar-footer">
        <a th:href="@{/profile}" class="profile-link">Settings: <span th:text="${user.username}"></span></a>
    </div>
</aside>

<main class="main-chat">
    <header class="chat-header" th:if="${activeSessionId != null}">
    <span id="active-session-title"
          th:text="${#lists.isEmpty(sessions.?[id == #activeSessionId]) ? 'New Chat' : sessions.?[id == #activeSessionId][0].summary}">
    </span>

        <div class="dropdown">
            <button class="dropbtn">Download ▾</button>
            <div class="dropdown-content">
                <a th:href="@{/sessions/{id}/export(id=${activeSessionId}, format='md')}">Markdown (.md)</a>
                <a th:href="@{/sessions/{id}/export(id=${activeSessionId}, format='pdf')}">PDF (.pdf)</a>
            </div>
        </div>
    </header>
    <div class="chat-history" id="chat-history">
        <div th:if="${messages != null}">
            <div th:each="msg : ${messages}"
                 th:class="'message ' + ${msg.sender}"
                 th:attr="data-raw-content=${msg.content}">
                <button th:if="${msg.sender == 'ai'}" class="copy-message-btn" title="Copy message">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                </button>
                <div class="message-content"></div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="message ai hidden">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div th:if="${activeSessionId == null}" style="text-align: center; margin-top: 100px; color: #8b949e;">
            <h2>Welcome to AI Chat Assistant</h2>
            <p>Select a chat or start a new one to begin.</p>
        </div>
    </div>

    <button id="scroll-bottom-btn" class="scroll-bottom-btn hidden" title="Back to latest">
        ↓
    </button>

    <div class="input-area" th:if="${activeSessionId != null}">
        <div class="input-container">
            <input type="text" id="message-input" placeholder="Type your message here..." autofocus>
            <button class="send-btn" id="send-btn">Send</button>
        </div>
    </div>
</main>

<script th:inline="javascript">
    /*<![CDATA[*/
    const sessionId = /*[[${activeSessionId}]]*/ null;
    let stompClient = null;

    /* Inside your connect() function */
    function connect() {
        // Fetch the CSRF token from the meta tags (provided by Spring Security)
        const headerName = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
        const token = /*[[${_csrf.token}]]*/ '';

        const socket = new SockJS(/*[[@{/chat-websocket}]]*/ '/chat-websocket');
        stompClient = Stomp.over(socket);

        // Pass the CSRF token in the connection headers
        const headers = {};
        headers[headerName] = token;

        stompClient.connect(headers, function (frame) {
            console.log('Connected: ' + frame);

            if (sessionId) {
                stompClient.subscribe('/topic/messages/' + sessionId, function (messageOutput) {
                    showMessage(JSON.parse(messageOutput.body));
                });
            }

            // Subscribe to updates for ALL sessions in the sidebar
            document.querySelectorAll('[data-session-id]').forEach(sessionLink => {
                const id = sessionLink.getAttribute('data-session-id');
                stompClient.subscribe('/topic/session-update/' + id, function (sessionOutput) {
                    const updatedSession = JSON.parse(sessionOutput.body);
                    const link = document.querySelector('[data-session-id="' + updatedSession.id + '"]');
                    if (link) {
                        link.textContent = updatedSession.summary;
                    }
                    if (updatedSession.id === sessionId) {
                        const headerTitle = document.getElementById('active-session-title');
                        if (headerTitle) {
                            headerTitle.textContent = updatedSession.summary;
                        }
                    }
                });
            });
        });
    }

    function showMessage(message) {
        // Hide typing indicator when AI starts responding
        document.getElementById('typing-indicator').classList.add('hidden');

        const history = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + message.sender;

        if (message.sender === 'ai') {
            msgDiv.innerHTML = `
                    <button class="copy-message-btn" title="Copy message">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    </button>
                    <div class="message-content">${marked.parse(message.content)}</div>
                `;
        } else {
            msgDiv.innerHTML = `<div class="message-content">${marked.parse(message.content)}</div>`;
        }

        history.appendChild(msgDiv);
        Prism.highlightAll()
        addCopyButtons();

        // SMOOTH SCROLL LOGIC
        history.scrollTo({
            top: history.scrollHeight,
            behavior: 'smooth' // This adds the sliding animation
        });
    }

    function addCopyButtons() {
        // Look for all 'pre' tags within any message that isn't from the user
        document.querySelectorAll('.message:not(.user) pre').forEach(pre => {
            if (pre.querySelector('.copy-btn')) return;

            const button = document.createElement('button');
            button.className = 'copy-btn';
            button.textContent = 'Copy';

            button.addEventListener('click', () => {
                // Get text, excluding the button's own text
                const codeElement = pre.querySelector('code');
                const textToCopy = codeElement ? codeElement.innerText : pre.innerText.replace('Copy', '');

                navigator.clipboard.writeText(textToCopy).then(() => {
                    button.textContent = 'Copied!';
                    button.style.background = '#28a745'; // Green feedback
                    setTimeout(() => {
                        button.textContent = 'Copy';
                        button.style.background = '';
                    }, 2000);
                });
            });

            pre.appendChild(button);
        });
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (content && stompClient) {
            // Show typing indicator
            const indicator = document.getElementById('typing-indicator');
            indicator.classList.remove('hidden');
            const history = document.getElementById('chat-history');
            history.appendChild(indicator); // Move to bottom
            history.scrollTop = history.scrollHeight;

            stompClient.send("/app/chat", {}, JSON.stringify({'sessionId': sessionId, 'content': content}));
            input.value = '';
        }
    }

    document.getElementById('send-btn')?.addEventListener('click', sendMessage);
    document.getElementById('message-input')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Global copy message button handler
    document.addEventListener('click', (e) => {
        if (e.target.closest('.copy-message-btn')) {
            const btn = e.target.closest('.copy-message-btn');
            const messageDiv = btn.closest('.message');
            // Get text while ignoring the button itself
            const textToCopy = messageDiv.querySelector('.message-content').innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalSVG = btn.innerHTML;
                btn.innerHTML = '<span style="font-size: 10px;">Copied!</span>';
                setTimeout(() => btn.innerHTML = originalSVG, 2000);
            });
        }
    });

    connect();
    // Parse existing messages using the raw data attribute
    document.querySelectorAll('.message[data-raw-content]').forEach(msg => {
        const raw = msg.getAttribute('data-raw-content');
        const contentDiv = msg.querySelector('.message-content');
        if (contentDiv) {
            contentDiv.innerHTML = marked.parse(raw);
        } else {
            msg.innerHTML = marked.parse(raw);
        }
    });
    Prism.highlightAll();
    addCopyButtons();
    const history = document.getElementById('chat-history');
    history.scrollTop = history.scrollHeight;

    // Scroll to Bottom Button Logic
    const scrollBtn = document.getElementById('scroll-bottom-btn');

    // 1. Show/Hide button based on scroll position
    history.addEventListener('scroll', () => {
        const threshold = 300; // Pixels from bottom
        const isScrolledUp = history.scrollHeight - history.scrollTop - history.clientHeight > threshold;

        if (isScrolledUp) {
            scrollBtn.classList.remove('hidden');
        } else {
            scrollBtn.classList.add('hidden');
        }
    });

    // 2. Click to jump to bottom
    scrollBtn.addEventListener('click', () => {
        history.scrollTo({
            top: history.scrollHeight,
            behavior: 'smooth'
        });
    });
    /*]]>*/
</script>
</body>
</html>
