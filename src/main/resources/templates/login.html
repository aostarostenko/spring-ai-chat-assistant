<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - AI Chat Assistant</title>
    <link rel="stylesheet" th:href="@{/css/chat-style.css}">
</head>
<body class="card-container">
    <div class="card">
        <h2>Login</h2>
        <div th:if="${param.error}" class="error-msg">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" style="color: #3fb950; margin-bottom: 20px;">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" style="color: #3fb950; margin-bottom: 20px;">
            Registration successful! Please login.
        </div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="new-chat-btn">Login</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.9em;">
            Don't have an account? <a th:href="@{/register}" style="color: var(--accent-color);">Sign up</a>
        </p>
    </div>
</body>
</html>
