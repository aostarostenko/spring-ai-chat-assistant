<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - AI Chat Assistant</title>
    <link rel="stylesheet" th:href="@{/css/chat-style.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="card-container">
<div class="card">
    <h2>Sign Up</h2>
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="new-chat-btn">Register</button>
    </form>
    <p style="margin-top: 20px; font-size: 0.9em;">
        Already have an account? <a th:href="@{/login}" style="color: var(--accent-color);">Login</a>
    </p>
</div>
</body>
</html>
